services:
  postgres:
    image: postgres:17-alpine
    container_name: workbench-postgres
    environment:
      POSTGRES_USER: ${WORKBENCH_POSTGRES_USER:-workbench}
      POSTGRES_PASSWORD: ${WORKBENCH_POSTGRES_PASSWORD:-workbench}
      POSTGRES_DB: ${WORKBENCH_POSTGRES_DB:-workbench}
    ports:
      - "${WORKBENCH_POSTGRES_PORT:-5432}:5432"
    volumes:
      - workbench-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  nats:
    image: nats:2.10-alpine
    container_name: workbench-nats
    command: ["-js", "-sd", "/data", "--name", "workbench-dev", "--http_port", "8222"]
    ports:
      - "${WORKBENCH_NATS_PORT:-4222}:4222"
      - "${WORKBENCH_NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - workbench-nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  workbench-postgres-data:
  workbench-nats-data:
