name: Workbench specification
about: Specify a Workbench capability, manager, integration, or architectural slice
labels: [specification]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / intent
      description: What user or agent problem does this solve?
      placeholder: Describe the desired behavior and why it matters.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included in this issue?
      placeholder: List included capabilities, resources, tools, managers, or state changes.
    validations:
      required: true
  - type: textarea
    id: non_scope
    attributes:
      label: Non-scope
      description: What should explicitly not be done in this issue?
    validations:
      required: false
  - type: dropdown
    id: manager
    attributes:
      label: Primary abstraction / manager
      options:
        - SessionManager
        - NamespaceManager
        - ProjectManager
        - SkillManager / SkillRegistry
        - KnowledgeManager
        - TaskManager
        - BackgroundManager
        - ContextManager
        - MCP protocol surface
        - Documentation / ADR only
        - Other
    validations:
      required: true
  - type: textarea
    id: mcp_contract
    attributes:
      label: MCP contract impact
      description: Does this change tools, resources, prompts, refresh behavior, or list-changed notifications?
      placeholder: Describe added/changed/removed MCP capabilities and expected discovery flow.
    validations:
      required: true
  - type: textarea
    id: state_machine
    attributes:
      label: State / persistence impact
      description: Does this change durable state, state machines, sessions, tasks, or stores?
      placeholder: Describe object schemas, state transitions, and persistence expectations.
    validations:
      required: false
  - type: textarea
    id: adr_impact
    attributes:
      label: ADR impact
      description: Every architecture-affecting issue must update or create ADRs.
      placeholder: |
        Required answer:
        - ADRs to update:
        - ADRs to create:
        - If none, explain why this is not architecture-affecting.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Observable checks that prove this is done.
      placeholder: Include tests, docs, MCP test expectations, and any resources/tools to verify.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification commands
      value: |
        - [ ] gofmt -w cmd/workbench-mcp/main.go internal/mcpserver/*.go internal/mcpserver/skills/*.go
        - [ ] make build
        - [ ] make test
        - [ ] hermes mcp test workbench
        - [ ] ADRs updated or explicitly marked not applicable
    validations:
      required: true
